name: Build libsingbox.so

on:
  workflow_dispatch:
    inputs:
      singbox_url:
        description: 'sing-box source zip URL'
        required: false
        type: string
        default: 'https://github.com/SagerNet/sing-box/archive/refs/tags/v1.14.0-alpha.44.zip'
      version:
        description: 'Version label, e.g. 1.14.0-alpha.44'
        required: false
        type: string
        default: '1.14.0-alpha.44'
      tags_extra:
        description: 'Extra Go build tags (comma-separated)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  # ── glibc compatibility: build inside ubuntu:20.04 container ──
  # Resulting .so links against glibc 2.31, runs on:
  #   Ubuntu 20.04+, Debian 11+, RHEL 9+, and any newer distro.
  BUILD_IMAGE: ubuntu:20.04
  GO_VERSION: 1.24.7

jobs:
  build:
    name: Build .so (linux-amd64)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Check out THIS repo (libso source files) ──
      - name: Checkout libso overlay
        uses: actions/checkout@v5
        with:
          path: overlay

      # ── 2. Download upstream sing-box source zip ──
      - name: Download sing-box source
        run: |
          set -xeuo pipefail
          URL="${{ inputs.singbox_url }}"
          echo "Downloading: $URL"
          curl -fsSLo sing-box.zip "$URL"
          unzip -q sing-box.zip
          mv sing-box-* upstream
          echo "Upstream directory:"
          ls upstream/

      # ── 3. Overlay libso files ──
      - name: Apply libso overlay
        run: |
          set -xeuo pipefail
          cp -r overlay/experimental/libso upstream/experimental/libso
          ls -la upstream/experimental/libso/main.go
          ls -la upstream/experimental/libso/libsingbox.h

      # ── 4. Assemble build tags ──
      - name: Assemble build tags
        id: tags
        run: |
          TAGS="with_cloudflared,with_quic,with_wireguard,with_utls,with_clash_api"
          EXTRA='${{ inputs.tags_extra }}'
          if [ -n "${EXTRA}" ]; then
            TAGS="${TAGS},${EXTRA}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Build tags: $TAGS"

      # ── 5. Build inside ubuntu:20.04 container (glibc 2.31) ──
      - name: Build libsingbox.so
        run: |
          set -xeuo pipefail

          mkdir -p dist

          TAGS='${{ steps.tags.outputs.tags }}'
          VER='${{ inputs.version }}'
          GO_VER='${{ env.GO_VERSION }}'

          docker run --rm \
            -v "$(pwd)/upstream:/src" \
            -v "$(pwd)/dist:/dist" \
            -w /src \
            "${{ env.BUILD_IMAGE }}" \
            bash -exc '
              # Install build tools
              apt-get update -qq
              apt-get install -y -qq wget gcc libc6-dev 1>&2

              # Install Go
              wget -q "https://go.dev/dl/go'"${GO_VER}"'.linux-amd64.tar.gz"
              tar -C /usr/local -xzf "go'"${GO_VER}"'.linux-amd64.tar.gz"
              export PATH="/usr/local/go/bin:$PATH"
              go version

              # Build
              export CGO_ENABLED=1
              export GOOS=linux
              export GOARCH=amd64

              mkdir -p /dist
              go build \
                -buildmode=c-shared \
                -v \
                -trimpath \
                -buildvcs=false \
                -tags "'"${TAGS}"'" \
                -ldflags "-X github.com/sagernet/sing-box/constant.Version='"${VER}"' -s -w -buildid=" \
                -o /dist/libsingbox-linux-amd64.so \
                ./experimental/libso

              echo ""
              echo "=== Built .so ==="
              ls -lh /dist/libsingbox-linux-amd64.so
            '

      # ── 6. Verify glibc compatibility ──
      - name: Verify
        run: |
          set -xeuo pipefail

          echo "=== ldd ==="
          ldd dist/libsingbox-linux-amd64.so 2>&1 || true

          echo ""
          echo "=== Max GLIBC version required ==="
          objdump -T dist/libsingbox-linux-amd64.so 2>/dev/null \
            | grep -oP 'GLIBC_[0-9]+\.[0-9]+' \
            | sort -Vu \
            | tail -3 || echo "(none)"

          echo ""
          echo "=== Size ==="
          ls -lh dist/libsingbox-linux-amd64.so

      # ── 7. Package ──
      - name: Package artifacts
        run: |
          cp upstream/experimental/libso/libsingbox.h dist/
          cp overlay/experimental/libso/test.py dist/ 2>/dev/null || true

      # ── 8. Upload ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsingbox-linux-amd64
          path: |
            dist/libsingbox-linux-amd64.so
            dist/libsingbox.h
          if-no-files-found: error
