name: Build libsingbox.so

on:
  workflow_dispatch:
    inputs:
      singbox_url:
        description: 'sing-box source zip URL'
        required: false
        type: string
        default: 'https://github.com/SagerNet/sing-box/archive/refs/tags/v1.14.0-alpha.44.zip'
      version:
        description: 'Version label, e.g. 1.14.0-alpha.44'
        required: false
        type: string
        default: '1.14.0-alpha.44'
      tags_extra:
        description: 'Extra Go build tags (comma-separated)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build .so (linux-amd64)
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Check out THIS repo (libso source files) ──
      - name: Checkout libso overlay
        uses: actions/checkout@v5
        with:
          path: overlay

      # ── 2. Download upstream sing-box source zip ──
      - name: Download sing-box source
        run: |
          set -xeuo pipefail
          URL="${{ inputs.singbox_url }}"
          echo "Downloading: $URL"
          curl -fsSLo sing-box.zip "$URL"
          unzip -q sing-box.zip
          mv sing-box-* upstream
          echo "Upstream directory:"
          ls upstream/

      # ── 3. Overlay libso files ──
      - name: Apply libso overlay
        run: |
          set -xeuo pipefail
          cp -r overlay/experimental/libso upstream/experimental/libso
          ls -la upstream/experimental/libso/main.go
          ls -la upstream/experimental/libso/libsingbox.h

      # ── 4. Read Go version from upstream go.mod ──
      - name: Read required Go version
        id: gover
        run: |
          GOVER="$(grep -oP '^go \K[0-9.]+' upstream/go.mod)"
          echo "version=$GOVER" >> "$GITHUB_OUTPUT"
          echo "Upstream requires Go: $GOVER"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~${{ steps.gover.outputs.version }}'

      # ── 5. Install musl ──
      - name: Install musl toolchain
        run: |
          set -xeuo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools
          echo '--- musl-gcc version ---'
          x86_64-linux-musl-gcc --version

      # ── 6. Build tags ──
      - name: Assemble build tags
        id: tags
        run: |
          TAGS="with_cloudflared,with_quic,with_wireguard,with_utls,with_clash_api"
          EXTRA='${{ inputs.tags_extra }}'
          if [ -n "${EXTRA}" ]; then
            TAGS="${TAGS},${EXTRA}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      # ── 7. Build libsingbox.so (musl static) ──
      - name: Build libsingbox.so
        run: |
          set -xeuo pipefail

          cd upstream
          mkdir -p dist

          VER='${{ inputs.version }}'

          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=amd64
          export CC=x86_64-linux-musl-gcc
          export CGO_LDFLAGS='-static'

          go build \
            -buildmode=c-shared \
            -v \
            -trimpath \
            -tags '${{ steps.tags.outputs.tags }}' \
            -ldflags "-linkmode external -extldflags '-static' -X github.com/sagernet/sing-box/constant.Version=${VER} -s -w -buildid=" \
            -o dist/libsingbox-linux-amd64.so \
            ./experimental/libso

          echo ''
          echo '=== Built .so info ==='
          file dist/libsingbox-linux-amd64.so
          ls -lh dist/libsingbox-linux-amd64.so

      # ── 8. Verify: .so must have NO glibc dependency ──
      - name: Verify no glibc dependency
        run: |
          set -xeuo pipefail

          cd upstream

          echo '=== ldd (should show "not a dynamic executable" or musl only) ==='
          ldd dist/libsingbox-linux-amd64.so 2>&1 || true

          echo ''
          echo '=== Checking for glibc symbols (should produce NO output) ==='
          if nm -D dist/libsingbox-linux-amd64.so 2>/dev/null | grep -i 'glibc\|GLIBC'; then
            echo '::error::.so contains GLIBC symbols — it will NOT work on older Linux!'
            exit 1
          else
            echo 'PASS: No glibc symbols detected.'
          fi

          echo ''
          echo '=== Checking for musl symbols (confirms musl linked correctly) ==='
          nm -D dist/libsingbox-linux-amd64.so 2>/dev/null | grep musl | head -5 || echo '(musl linked — good, symbols are statically baked in)'

      # ── 9. Package ──
      - name: Package artifacts
        run: |
          cp upstream/experimental/libso/libsingbox.h upstream/dist/

      # ── 10. Upload ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsingbox-linux-amd64
          path: |
            upstream/dist/libsingbox-linux-amd64.so
            upstream/dist/libsingbox.h
          if-no-files-found: error
